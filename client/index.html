<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pudge Wars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0005; font-family: Arial, sans-serif; }
    #canvas { display: block; position: absolute; top: 0; left: 0; }

    /* ─ Overlay screens ─ */
    #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .screen { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 20px; }
    .screen.active { display: flex; }

    h1 { font-family: 'Arial Black', sans-serif; font-size: 42px; color: #e74c3c;
         text-shadow: 0 0 24px rgba(231,76,60,0.7), 2px 2px 0 #000; letter-spacing: 2px; }
    .subtitle { color: #888; font-size: 14px; }
    .instructions { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
                    border-radius: 8px; padding: 12px 18px; color: #bbb; font-size: 13px;
                    line-height: 2; text-align: center; }
    .btn { font-family: 'Arial Black', sans-serif; font-size: 17px; color: #fff;
           background: #e74c3c; border: none; padding: 12px 28px; border-radius: 6px;
           cursor: pointer; width: 210px; }
    .btn-green { background: #27ae60; }
    .btn:active { filter: brightness(0.75); }

    /* ─ Loading spinner ─ */
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(255,255,255,0.12);
      border-top-color: #e74c3c;
      border-radius: 50%;
      animation: spin-r 0.75s linear infinite;
    }
    @keyframes spin-r { to { transform: rotate(360deg); } }
    .loading-text { color: #999; font-size: 15px; margin-top: 4px; }

    /* ─ In-game HUD ─ */
    #hud { position: absolute; top: 0; left: 0; right: 0; display: none;
           padding: 8px 14px; pointer-events: none; }
    #hud-hp   { font-size: 22px; }
    #hud-team { font-size: 13px; color: #ccc; margin-top: 2px; }

    /* ─ Joystick overlay canvas ─ */
    #joy-canvas { position: absolute; inset: 0; pointer-events: none; display: none; }

    /* ─ Countdown overlay ─ */
    #countdown-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 80;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.38);
      pointer-events: none;
    }
    #countdown-num {
      font-family: 'Arial Black', sans-serif;
      font-size: clamp(90px, 22vw, 170px);
      color: #fff;
      text-shadow: 0 0 60px rgba(255,255,255,0.4), 3px 3px 0 #000;
      will-change: transform, opacity;
    }

    /* ─ Portrait rotation overlay ─ */
    #rotate-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: #0d0005;
      flex-direction: column; align-items: center; justify-content: center;
      color: #fff; gap: 18px;
    }
    #rotate-overlay .icon { font-size: 56px; animation: spin 2s ease-in-out infinite alternate; }
    #rotate-overlay p { font-size: 16px; color: #aaa; text-align: center; padding: 0 30px; }
    @keyframes spin { from { transform: rotate(-30deg); } to { transform: rotate(30deg); } }
    @media (orientation: portrait) { #rotate-overlay { display: flex; } }
  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="joy-canvas"></canvas>

  <div id="overlay">
    <!-- Menu -->
    <div id="screen-menu" class="screen active">
      <h1>PUDGE WARS</h1>
      <p class="subtitle">2 vs 2 · Изометрическая арена</p>
      <div class="instructions">
        🕹 Левый джойстик — движение<br>
        🎯 Правый джойстик — прицел и бросок крюка<br>
        💀 2 попадания = противник повержен
      </div>
      <button class="btn" id="btn-pvp">НАЙТИ ИГРУ (2v2)</button>
      <button class="btn btn-green" id="btn-bots">ИГРАТЬ vs БОТЫ</button>
    </div>

    <!-- Searching -->
    <div id="screen-search" class="screen">
      <p id="search-text" style="color:#fff;font-size:22px;text-align:center">Поиск игроков...</p>
    </div>

    <!-- Loading models -->
    <div id="screen-loading" class="screen">
      <div class="spinner"></div>
      <p class="loading-text">Загрузка...</p>
    </div>

    <!-- Game Over -->
    <div id="screen-gameover" class="screen">
      <h1 id="gameover-title">ПОБЕДА!</h1>
      <p id="gameover-sub" style="color:#ccc;font-size:20px"></p>
    </div>
  </div>

  <!-- In-game HUD -->
  <div id="hud">
    <div id="hud-hp">❤❤</div>
    <div id="hud-team"></div>
  </div>

  <!-- Countdown 3-2-1 -->
  <div id="countdown-overlay">
    <div id="countdown-num">3</div>
  </div>

  <!-- Portrait mode warning -->
  <div id="rotate-overlay">
    <div class="icon">📱</div>
    <p>Поверните устройство горизонтально для игры</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
